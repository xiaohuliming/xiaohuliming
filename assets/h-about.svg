<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 46" width="180" height="46" role="img" aria-label="ABOUT 关于">
<style>
 .blk{animation:cyc 3s linear infinite}
 @keyframes cyc{0%,100%{fill:#0A84FF}33%{fill:#FF453A}66%{fill:#FFD60A}}
 .swp{animation:swp 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:left center}
 @keyframes swp{0%{transform:scaleX(.06)}50%{transform:scaleX(1)}100%{transform:scaleX(.06)}}
 .ttl{font-family:'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;font-weight:800;animation:in .6s cubic-bezier(.2,.9,.2,1) both}
 @keyframes in{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
</style>
<rect class="blk" x="3" y="9" width="8" height="28"/>
<text class="ttl" x="24" y="32" font-size="22" fill="#111111">ABOUT · 关于</text>
<rect class="swp" x="24" y="39" width="140" height="4" fill="#0A84FF"/>
</svg>
