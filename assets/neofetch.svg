<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" role="img" aria-labelledby="t d" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">
<title id="t">F0Xy@github — neofetch</title>
<desc id="d">Neo-brutalist terminal card in neofetch style: an origami fox logo beside a spec sheet of skills, years coding and shipped work, with a blinking cursor.</desc>
<defs>
  <pattern id="ng" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#111111" opacity="0.06"/>
  </pattern>
  <clipPath id="np"><rect x="10" y="14" width="844" height="336"/></clipPath>
</defs>
<style>
  .cjk{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
  .cur{animation:blink 1.1s steps(1) infinite}
  @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
  .k{font-weight:700}
  .panel{animation:snap .5s cubic-bezier(.2,.9,.25,1) both;transform-box:fill-box;transform-origin:top left}
  @keyframes snap{from{transform:translate(-8px,-8px)}to{transform:translate(0,0)}}
</style>

<!-- shadow + panel -->
<rect x="16" y="20" width="848" height="340" fill="#111111"/>
<g class="panel">
<rect x="8" y="12" width="848" height="340" fill="#f4f1ea" stroke="#111111" stroke-width="4"/>
<g clip-path="url(#np)">
<rect x="10" y="14" width="844" height="336" fill="url(#ng)"/>

<!-- title bar -->
<rect x="10" y="14" width="844" height="34" fill="#111111"/>
<circle cx="34" cy="31" r="6" fill="#FF453A"/>
<circle cx="56" cy="31" r="6" fill="#FFD60A"/>
<circle cx="78" cy="31" r="6" fill="#5DCAA5"/>
<text x="104" y="36" font-size="13.5" fill="#e8e4d8">F0Xy@github: ~/profile</text>
<text x="828" y="36" text-anchor="end" font-size="13" fill="#8a8a8a">— zsh —</text>

<!-- ===== LEFT: origami fox ===== -->
<g stroke="#111111" stroke-width="4" stroke-linejoin="round">
  <!-- ears (behind face) -->
  <polygon points="100,126 80,52 158,120" fill="#FF453A"/>
  <polygon points="200,126 220,52 142,120"/>
  <polygon points="200,126 220,52 142,120" fill="#FF453A"/>
  <polygon points="107,120 96,74 146,120" fill="#111111" stroke-width="0"/>
  <polygon points="193,120 204,74 154,120" fill="#111111" stroke-width="0"/>
  <!-- face -->
  <polygon points="92,114 208,114 199,174 150,240 101,174" fill="#FF453A"/>
  <!-- white muzzle -->
  <polygon points="116,156 184,156 150,224" fill="#f7f4ec" stroke-width="3"/>
</g>
<!-- eyes + nose -->
<polygon points="120,138 148,148 123,155" fill="#111111"/>
<polygon points="180,138 152,148 177,155" fill="#111111"/>
<polygon points="143,190 157,190 150,201" fill="#111111"/>

<!-- ===== RIGHT: neofetch spec ===== -->
<g font-size="15">
  <text x="300" y="92"><tspan class="k" fill="#0A84FF">F0Xy</tspan><tspan fill="#111111">@</tspan><tspan class="k" fill="#FF453A">github</tspan></text>
  <text x="300" y="108" font-size="13" fill="#999999">──────────────────────────────</text>

  <g font-size="14.5">
    <text x="300" y="140"><tspan class="k" fill="#0A84FF">OS</tspan><tspan x="392" fill="#111111">macOS · Arch Linux</tspan></text>
    <text x="300" y="166"><tspan class="k" fill="#FF453A">Host</tspan><tspan x="392" fill="#111111">BNBU · AI undergrad '27</tspan></text>
    <text x="300" y="192"><tspan class="k" fill="#0A84FF">Uptime</tspan><tspan x="392" fill="#111111">3+ years, still committing</tspan></text>
    <text x="300" y="218"><tspan class="k" fill="#FF453A">Kernel</tspan><tspan x="392" fill="#111111">Python 3.11</tspan></text>
    <text x="300" y="244"><tspan class="k" fill="#0A84FF">Shell</tspan><tspan x="392" fill="#111111">zsh · nvim · vscode</tspan></text>
    <text x="300" y="270"><tspan class="k" fill="#FF453A">Stack</tspan><tspan x="392" fill="#111111">Flask · Vue · PyTorch</tspan></text>
    <text x="300" y="296"><tspan class="k" fill="#0A84FF">Langs</tspan><tspan x="392" fill="#111111">Python · JS · SQL · C</tspan></text>
    <text x="300" y="322"><tspan class="k" fill="#FF453A">Shipped</tspan><tspan x="392" fill="#111111">20k+ users served in prod</tspan></text>
  </g>

  <!-- palette swatches -->
  <g>
    <rect x="300" y="334" width="16" height="12" fill="#111111"/>
    <rect x="320" y="334" width="16" height="12" fill="#0A84FF"/>
    <rect x="340" y="334" width="16" height="12" fill="#FF453A"/>
    <rect x="360" y="334" width="16" height="12" fill="#FFD60A"/>
    <rect x="380" y="334" width="16" height="12" fill="#5DCAA5"/>
    <rect x="400" y="334" width="16" height="12" fill="#666666"/>
    <rect x="420" y="334" width="16" height="12" fill="#f4f1ea" stroke="#111111" stroke-width="1"/>
    <rect x="440" y="334" width="16" height="12" fill="#ffffff" stroke="#111111" stroke-width="1"/>
  </g>
  <rect class="cur" x="620" y="312" width="11" height="17" fill="#111111"/>
</g>

</g>
</g>
</svg>
