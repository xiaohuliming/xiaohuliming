<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-labelledby="t d" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">
<title id="t">F0Xy · 黄子隽 — Full-Stack Developer &amp; ML</title>
<desc id="d">Animated neo-brutalist hero banner with glitch wordmark, pulsing accent, floating tags and a wobbling sticker.</desc>
<defs>
  <pattern id="dg" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#111111" opacity="0.07"/>
  </pattern>
  <clipPath id="pc"><rect x="10" y="14" width="844" height="196"/></clipPath>
</defs>
<style>
  .panel{animation:snap .5s cubic-bezier(.2,.9,.25,1) both;transform-box:fill-box;transform-origin:top left}
  @keyframes snap{from{transform:translate(-8px,-8px)}to{transform:translate(0,0)}}
  .nf{font-family:'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:900;font-size:64px}
  .base{animation:jit 3s steps(1) infinite;transform-box:fill-box;transform-origin:center}
  @keyframes jit{0%,90%,100%{transform:translate(0,0)}92%{transform:translate(1px,0) skewX(-5deg)}95%{transform:translate(-1px,0) skewX(4deg)}}
  .gA{animation:gA 3s steps(1) infinite}
  .gB{animation:gB 3s steps(1) infinite}
  @keyframes gA{0%,89%,100%{opacity:0;transform:translate(0,0)}90%{opacity:.85;transform:translate(-3px,1px)}94%{opacity:.85;transform:translate(2px,-1px)}97%{opacity:0}}
  @keyframes gB{0%,89%,100%{opacity:0;transform:translate(0,0)}91%{opacity:.85;transform:translate(3px,-1px)}95%{opacity:.85;transform:translate(-2px,1px)}98%{opacity:0}}
  .cur{animation:blink 1s steps(1) infinite}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
  .accent{animation:bar 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:left center}
  @keyframes bar{0%{transform:scaleX(.45);fill:#0A84FF}33%{transform:scaleX(1);fill:#FF453A}66%{transform:scaleX(.7);fill:#FFD60A}100%{transform:scaleX(.45);fill:#0A84FF}}
  .tag{transform-box:fill-box}
  .t1{animation:fade .5s ease .25s both,flo 3.4s ease-in-out 1s infinite}
  .t2{animation:fade .5s ease .4s both,flo 3.4s ease-in-out 1.3s infinite}
  .t3{animation:fade .5s ease .55s both,flo 3.4s ease-in-out 1.6s infinite}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes flo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .stk{animation:wob 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  @keyframes wob{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(0deg)}}
  .cjk{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif}
</style>

<rect x="16" y="20" width="848" height="200" fill="#111111"/>
<g class="panel">
  <rect x="8" y="12" width="848" height="200" fill="#f4f1ea" stroke="#111111" stroke-width="4"/>
  <rect x="10" y="14" width="844" height="196" fill="url(#dg)"/>

  <g clip-path="url(#pc)">
    <text x="44" y="96" class="nf gB" fill="#0A84FF">F0Xy</text>
    <text x="44" y="96" class="nf gA" fill="#FF453A">F0Xy</text>
    <text x="44" y="96" class="nf base" fill="#111111">F0Xy</text>
  </g>
  <rect class="cur" x="214" y="48" width="20" height="50" fill="#0A84FF"/>

  <text x="46" y="124" font-size="16" letter-spacing="1" fill="#444444"><tspan class="cjk">黄子隽</tspan>  ·  ZIJUN HUANG</text>
  <rect class="accent" x="46" y="140" width="160" height="9" fill="#0A84FF" stroke="#111111" stroke-width="2"/>

  <g class="tag t1">
    <rect x="50" y="170" width="148" height="34" fill="#111111"/>
    <rect x="46" y="166" width="148" height="34" fill="#0A84FF" stroke="#111111" stroke-width="3"/>
    <text x="120" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">FULL-STACK</text>
  </g>
  <g class="tag t2">
    <rect x="210" y="170" width="92" height="34" fill="#111111"/>
    <rect x="206" y="166" width="92" height="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="252" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">AI / ML</text>
  </g>
  <g class="tag t3">
    <rect x="314" y="170" width="92" height="34" fill="#111111"/>
    <rect x="310" y="166" width="92" height="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="356" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">QUANT</text>
  </g>

  <g class="stk">
    <rect x="650" y="56" width="184" height="44" fill="#111111"/>
    <rect x="646" y="52" width="184" height="44" fill="#FFD60A" stroke="#111111" stroke-width="3"/>
    <text x="738" y="79" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">OPEN TO 2027</text>
  </g>
</g>
</svg>
