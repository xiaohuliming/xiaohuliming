<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" role="img" aria-labelledby="heroTitle heroDesc" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">
<title id="heroTitle">F0Xy · 黄子隽 — Full-Stack Developer &amp; ML</title>
<desc id="heroDesc">Animated neo-brutalist hero banner for the GitHub profile of F0Xy (Zijun Huang).</desc>
<style>
  .panel{ animation: snap .55s cubic-bezier(.2,.85,.25,1) both; transform-box: fill-box; transform-origin: top left; }
  @keyframes snap{ from{ transform: translate(-8px,-8px) } to{ transform: translate(0,0) } }
  .accent{ animation: grow .6s ease-out .5s both; transform-box: fill-box; transform-origin: left center; }
  @keyframes grow{ from{ transform: scaleX(0) } to{ transform: scaleX(1) } }
  .tag{ animation: rise .5s ease-out both; transform-box: fill-box; }
  .t1{ animation-delay:.72s } .t2{ animation-delay:.86s } .t3{ animation-delay:1s }
  @keyframes rise{ from{ opacity:0; transform: translateY(12px) } to{ opacity:1; transform: translateY(0) } }
  .cur{ animation: blink 1.05s steps(1) infinite }
  @keyframes blink{ 0%,50%{ opacity:1 } 51%,100%{ opacity:0 } }
  .name{ font-family:'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:900 }
  .cjk{ font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif }
</style>

<rect x="16" y="20" width="848" height="200" fill="#111111"/>
<g class="panel">
  <rect x="8" y="12" width="848" height="200" fill="#f4f1ea" stroke="#111111" stroke-width="4"/>

  <text x="44" y="94" class="name" font-size="64" fill="#111111">F0Xy</text>
  <rect class="cur" x="214" y="48" width="20" height="50" fill="#0A84FF"/>

  <text x="46" y="124" font-size="16" letter-spacing="1" fill="#444444"><tspan class="cjk">黄子隽</tspan>  ·  ZIJUN HUANG</text>

  <rect class="accent" x="46" y="140" width="156" height="9" fill="#0A84FF" stroke="#111111" stroke-width="2"/>

  <g class="tag t1">
    <rect x="50" y="170" width="148" height="34" fill="#111111"/>
    <rect x="46" y="166" width="148" height="34" fill="#0A84FF" stroke="#111111" stroke-width="3"/>
    <text x="120" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">FULL-STACK</text>
  </g>
  <g class="tag t2">
    <rect x="210" y="170" width="92" height="34" fill="#111111"/>
    <rect x="206" y="166" width="92" height="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="252" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">AI / ML</text>
  </g>
  <g class="tag t3">
    <rect x="314" y="170" width="92" height="34" fill="#111111"/>
    <rect x="310" y="166" width="92" height="34" fill="#ffffff" stroke="#111111" stroke-width="3"/>
    <text x="356" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#111111">QUANT</text>
  </g>

  <g transform="rotate(-5 730 70)">
    <rect x="646" y="52" width="184" height="44" fill="#111111"/>
    <rect x="642" y="48" width="184" height="44" fill="#FFD60A" stroke="#111111" stroke-width="3"/>
    <text x="734" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#111111">OPEN TO 2027</text>
  </g>
</g>
</svg>
