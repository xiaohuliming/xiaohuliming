<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 54" width="880" height="54" role="img" aria-label="BUILD SMALL // SHIP OFTEN // FULL-STACK // AI / ML // QUANT // PHOTOGRAPHY">
<title>Scrolling marquee</title>
<style>
  .scroll{animation:mq 18s linear infinite}
  @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-1200px)}}
  .m{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace;font-weight:700;font-size:22px}
</style>
<clipPath id="c"><rect x="0" y="6" width="880" height="42"/></clipPath>
<rect x="0" y="6" width="880" height="42" fill="#111111"/>
<rect x="0" y="6" width="880" height="3" fill="#0A84FF"/>
<g clip-path="url(#c)">
  <g class="scroll">
    <text class="m" x="0" y="35" textLength="1200" lengthAdjust="spacing">
      <tspan fill="#f4f1ea">BUILD SMALL </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">SHIP OFTEN </tspan><tspan fill="#FFD60A">// </tspan><tspan fill="#5DCAA5">FULL-STACK </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">AI · ML </tspan><tspan fill="#FFD60A">// </tspan><tspan fill="#5DCAA5">QUANT </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">PHOTOGRAPHY </tspan><tspan fill="#FFD60A">// </tspan>
    </text>
    <text class="m" x="1200" y="35" textLength="1200" lengthAdjust="spacing">
      <tspan fill="#f4f1ea">BUILD SMALL </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">SHIP OFTEN </tspan><tspan fill="#FFD60A">// </tspan><tspan fill="#5DCAA5">FULL-STACK </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">AI · ML </tspan><tspan fill="#FFD60A">// </tspan><tspan fill="#5DCAA5">QUANT </tspan><tspan fill="#FF453A">// </tspan><tspan fill="#f4f1ea">PHOTOGRAPHY </tspan><tspan fill="#FFD60A">// </tspan>
    </text>
  </g>
</g>
</svg>
