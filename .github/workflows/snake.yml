name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate snake game
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#FF453A&color_dots=#f4f1ea,#5DCAA5,#0A84FF,#FFD60A,#FF453A

      - name: crop to the data region (hide the empty earlier weeks)
        run: |
          sudo sed -i -E 's#viewBox="-?[0-9]+ -?[0-9]+ [0-9]+ [0-9]+" width="[0-9]+" height="[0-9]+"#viewBox="540 -32 330 192" width="660" height="384"#' dist/snake.svg

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
